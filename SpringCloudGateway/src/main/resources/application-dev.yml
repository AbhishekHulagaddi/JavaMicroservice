server:
  port: 9200

spring:
  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:9201
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
jwt:
  secret: VERY_STRONG_SECRET_256_BIT_CHANGE_12345678901234567890
auth:
  service:
    url: http://localhost:9201  